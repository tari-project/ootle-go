---
name: CI

# Runs the same gate as `make check` (build + vet + test + gofmt) on every PR and on main.
#
# cgo links statically against the prebuilt lib committed under
# internal/cffi/lib/<goos>_<goarch>/. A platform can only be in this matrix once its `.a`
# is committed — otherwise the cgo LDFLAGS in internal/cffi/cffi.go point at a missing file
# and the link fails. Today only darwin/arm64 is vendored, so CI runs on Apple Silicon only.
#
# As `native-libs.yml` vendors the other platforms (from tari-ootle release assets), uncomment
# the matching rows below so each committed lib gets exercised on its native runner.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64, runner: macos-14 }
          # Uncomment each row once its platform lib is committed under internal/cffi/lib/:
          # - { goos: darwin,  goarch: amd64, runner: macos-15-intel }
          # - { goos: linux,   goarch: amd64, runner: ubuntu-latest }
          # - { goos: linux,   goarch: arm64, runner: ubuntu-24.04-arm }
          # - { goos: windows, goarch: amd64, runner: windows-latest }
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: make check
        run: make check
